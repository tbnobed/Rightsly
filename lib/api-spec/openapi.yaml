openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `application/pdf`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ContractAttachment:
      type: object
      required: [id, contractId, fileName, objectPath, createdAt]
      properties:
        id:
          type: string
        contractId:
          type: string
        fileName:
          type: string
        objectPath:
          type: string
        contentType:
          type: string
          nullable: true
        size:
          type: integer
          nullable: true
        uploadedByName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateContractAttachmentRequest:
      type: object
      required: [fileName, objectPath]
      properties:
        fileName:
          type: string
          minLength: 1
        objectPath:
          type: string
          minLength: 1
        contentType:
          type: string
        size:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    LoginData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, legal, finance, sales]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    CreateUserRequest:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, legal, finance, sales]
        password:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, legal, finance, sales]
        isActive:
          type: boolean
        password:
          type: string

    Partner:
      type: object
      required: [id, name, type, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [Licensor, Licensee, Both]
        website:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        contractCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePartnerRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [Licensor, Licensee, Both]
        website:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    UpdatePartnerRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [Licensor, Licensee, Both]
        website:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    ContentItem:
      type: object
      required: [id, type, title, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [Film, TVSeries, TBN_FAST, TBN_Linear, WoF_FAST]
        title:
          type: string
        description:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        seasons:
          type: array
          items:
            $ref: '#/components/schemas/Season'
        contractCount:
          type: integer
        hasCleans:
          type: boolean
        hasCaptions:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Season:
      type: object
      required: [id, contentItemId, seasonNumber]
      properties:
        id:
          type: string
        contentItemId:
          type: string
        seasonNumber:
          type: integer
        title:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        episodeCount:
          type: integer
          nullable: true

    CreateContentItemRequest:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [Film, TVSeries, TBN_FAST, TBN_Linear, WoF_FAST]
        title:
          type: string
        description:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        hasCleans:
          type: boolean
        hasCaptions:
          type: boolean
        seasons:
          type: array
          items:
            type: object
            required: [seasonNumber]
            properties:
              seasonNumber:
                type: integer
              title:
                type: string
                nullable: true
              year:
                type: integer
                nullable: true
              episodeCount:
                type: integer
                nullable: true

    UpdateContentItemRequest:
      type: object
      properties:
        type:
          type: string
          enum: [Film, TVSeries, TBN_FAST, TBN_Linear, WoF_FAST]
        title:
          type: string
        description:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        hasCleans:
          type: boolean
        hasCaptions:
          type: boolean
        seasons:
          type: array
          items:
            type: object
            required: [seasonNumber]
            properties:
              seasonNumber:
                type: integer
              title:
                type: string
                nullable: true
              year:
                type: integer
                nullable: true
              episodeCount:
                type: integer
                nullable: true

    Contract:
      type: object
      required: [id, direction, partnerId, status, endType, createdAt]
      properties:
        id:
          type: string
        direction:
          type: string
          enum: [rights_in, rights_out]
        partnerId:
          type: string
        partnerName:
          type: string
        licensor:
          type: string
          nullable: true
        licensee:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, expired, in_perpetuity, terminated]
        startDate:
          type: string
          format: date
          nullable: true
        endType:
          type: string
          enum: [date, perpetuity, auto_renew]
        endDate:
          type: string
          format: date
          nullable: true
        territories:
          type: array
          items:
            type: string
        otherTerritories:
          type: string
          nullable: true
        distributionTypes:
          type: array
          items:
            type: string
        platform:
          type: string
          nullable: true
        royaltyType:
          type: string
          enum: [revenue_share, flat_fee, other]
          nullable: true
        royaltyDetails:
          type: string
          nullable: true
        paymentTerms:
          type: string
          enum: [net_30, net_60, net_90]
          nullable: true
        notes:
          type: string
          nullable: true
        documentUrl:
          type: string
          nullable: true
        websiteLink:
          type: string
          nullable: true
        departmentTags:
          type: array
          items:
            type: string
        archived:
          type: boolean
        rightsInDetails:
          $ref: '#/components/schemas/RightsInDetails'
          nullable: true
        rightsOutDetails:
          $ref: '#/components/schemas/RightsOutDetails'
          nullable: true
        contentItems:
          type: array
          items:
            $ref: '#/components/schemas/ContentItem'
        amendments:
          type: array
          items:
            $ref: '#/components/schemas/Amendment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdByName:
          type: string
          nullable: true

    RightsInDetails:
      type: object
      properties:
        platforms:
          type: array
          items:
            type: string
        youtubeChannel:
          type: string
          nullable: true
        socialPlatforms:
          type: array
          items:
            type: string
        socialHandle:
          type: string
          nullable: true
        grantOfRights:
          type: string
          nullable: true
        exclusivityStartDate:
          type: string
          format: date
          nullable: true
        exclusivityEndDate:
          type: string
          format: date
          nullable: true
        exclusivitySameAsDuration:
          type: boolean
        marketingRights:
          type: string
          nullable: true

    RightsOutDetails:
      type: object
      properties:
        autoRenew:
          type: boolean
        hasAmendment:
          type: boolean
        exclusivity:
          type: string
          enum: [exclusive, non_exclusive]
          nullable: true
        reportingFrequency:
          type: string
          enum: [monthly, quarterly, annually]
          nullable: true
        minPaymentThreshold:
          type: number
          nullable: true

    CreateContractRequest:
      type: object
      required: [direction, partnerId, endType]
      properties:
        direction:
          type: string
          enum: [rights_in, rights_out]
        partnerId:
          type: string
        licensor:
          type: string
          nullable: true
        licensee:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, expired, in_perpetuity, terminated]
        startDate:
          type: string
          format: date
          nullable: true
        endType:
          type: string
          enum: [date, perpetuity, auto_renew]
        endDate:
          type: string
          format: date
          nullable: true
        territories:
          type: array
          items:
            type: string
        otherTerritories:
          type: string
          nullable: true
        distributionTypes:
          type: array
          items:
            type: string
        platform:
          type: string
          nullable: true
        royaltyType:
          type: string
          enum: [revenue_share, flat_fee, other]
          nullable: true
        royaltyDetails:
          type: string
          nullable: true
        paymentTerms:
          type: string
          enum: [net_30, net_60, net_90]
          nullable: true
        notes:
          type: string
          nullable: true
        websiteLink:
          type: string
          nullable: true
        rightsInDetails:
          $ref: '#/components/schemas/RightsInDetails'
          nullable: true
        rightsOutDetails:
          $ref: '#/components/schemas/RightsOutDetails'
          nullable: true
        contentItemIds:
          type: array
          items:
            type: string
        departmentTags:
          type: array
          items:
            type: string

    UpdateContractRequest:
      type: object
      properties:
        partnerId:
          type: string
        licensor:
          type: string
          nullable: true
        licensee:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, expired, in_perpetuity, terminated]
        startDate:
          type: string
          format: date
          nullable: true
        endType:
          type: string
          enum: [date, perpetuity, auto_renew]
        endDate:
          type: string
          format: date
          nullable: true
        territories:
          type: array
          items:
            type: string
        otherTerritories:
          type: string
          nullable: true
        distributionTypes:
          type: array
          items:
            type: string
        platform:
          type: string
          nullable: true
        royaltyType:
          type: string
          enum: [revenue_share, flat_fee, other]
          nullable: true
        royaltyDetails:
          type: string
          nullable: true
        paymentTerms:
          type: string
          enum: [net_30, net_60, net_90]
          nullable: true
        notes:
          type: string
          nullable: true
        websiteLink:
          type: string
          nullable: true
        rightsInDetails:
          $ref: '#/components/schemas/RightsInDetails'
          nullable: true
        rightsOutDetails:
          $ref: '#/components/schemas/RightsOutDetails'
          nullable: true
        contentItemIds:
          type: array
          items:
            type: string
        departmentTags:
          type: array
          items:
            type: string
        archived:
          type: boolean

    ContractListItem:
      type: object
      required: [id, direction, status, endType, createdAt]
      properties:
        id:
          type: string
        direction:
          type: string
          enum: [rights_in, rights_out]
        partnerId:
          type: string
        partnerName:
          type: string
        licensor:
          type: string
          nullable: true
        licensee:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, expired, in_perpetuity, terminated]
        startDate:
          type: string
          format: date
          nullable: true
        endType:
          type: string
          enum: [date, perpetuity, auto_renew]
        endDate:
          type: string
          format: date
          nullable: true
        territories:
          type: array
          items:
            type: string
        distributionTypes:
          type: array
          items:
            type: string
        royaltyType:
          type: string
          nullable: true
        contentCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Amendment:
      type: object
      required: [id, contractId, date, description, createdAt]
      properties:
        id:
          type: string
        contractId:
          type: string
        date:
          type: string
          format: date
        description:
          type: string
        documentUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdByName:
          type: string
          nullable: true

    CreateAmendmentRequest:
      type: object
      required: [date, description]
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        documentUrl:
          type: string
          nullable: true

    RevenueReport:
      type: object
      required: [id, contractId, period, status, createdAt]
      properties:
        id:
          type: string
        contractId:
          type: string
        partnerName:
          type: string
          nullable: true
        period:
          type: string
        expectedDate:
          type: string
          format: date
          nullable: true
        receivedDate:
          type: string
          format: date
          nullable: true
        amount:
          type: number
          nullable: true
        status:
          type: string
          enum: [expected, received, overdue]
        createdAt:
          type: string
          format: date-time

    CreateRevenueReportRequest:
      type: object
      required: [period, status]
      properties:
        period:
          type: string
        expectedDate:
          type: string
          format: date
          nullable: true
        receivedDate:
          type: string
          format: date
          nullable: true
        amount:
          type: number
          nullable: true
        status:
          type: string
          enum: [expected, received, overdue]

    UpdateRevenueReportRequest:
      type: object
      properties:
        period:
          type: string
        expectedDate:
          type: string
          format: date
          nullable: true
        receivedDate:
          type: string
          format: date
          nullable: true
        amount:
          type: number
          nullable: true
        status:
          type: string
          enum: [expected, received, overdue]

    RoyaltyCalcResult:
      type: object
      required: [contractId, calculations]
      properties:
        contractId:
          type: string
        partnerName:
          type: string
        royaltyType:
          type: string
          nullable: true
        royaltyDetails:
          type: string
          nullable: true
        calculations:
          type: array
          items:
            type: object
            required: [reportId, period, revenueAmount, amountOwed, reviewStatus]
            properties:
              reportId:
                type: string
              period:
                type: string
              revenueAmount:
                type: number
                nullable: true
              sharePercentage:
                type: number
                nullable: true
              amountOwed:
                type: number
                nullable: true
              reviewStatus:
                type: string
                enum: [pending, reviewed, approved]
              reviewedBy:
                type: string
                nullable: true
              reviewedAt:
                type: string
                format: date-time
                nullable: true

    UpdateRoyaltyStatusRequest:
      type: object
      required: [reportId, status]
      properties:
        reportId:
          type: string
        status:
          type: string
          enum: [pending, reviewed, approved]

    RightsCheckResult:
      type: object
      required: [available, conflicts, grants]
      properties:
        available:
          type: boolean
        conflicts:
          type: array
          items:
            type: object
            required: [contractId, partnerName, reason]
            properties:
              contractId:
                type: string
              partnerName:
                type: string
              reason:
                type: string
              territory:
                type: string
                nullable: true
              distributionType:
                type: string
                nullable: true
        grants:
          type: array
          items:
            type: object
            required: [contractId, partnerName, direction]
            properties:
              contractId:
                type: string
              partnerName:
                type: string
              direction:
                type: string
              exclusivity:
                type: string
                nullable: true
              territories:
                type: array
                items:
                  type: string
              distributionTypes:
                type: array
                items:
                  type: string
              startDate:
                type: string
                format: date
                nullable: true
              endDate:
                type: string
                format: date
                nullable: true

    DashboardSummary:
      type: object
      required: [activeContracts, expiringSoon, upcomingReports, draftContracts]
      properties:
        activeContracts:
          type: integer
        expiringSoon:
          type: integer
        upcomingReports:
          type: integer
        draftContracts:
          type: integer
        totalRightsIn:
          type: integer
        totalRightsOut:
          type: integer
        calendarEvents:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEvent'
        expiringSoonContracts:
          type: array
          items:
            $ref: '#/components/schemas/ContractListItem'

    CalendarEvent:
      type: object
      required: [id, type, title, date]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [contract_start, contract_expiry, revenue_report_expected, revenue_report_overdue]
        title:
          type: string
        date:
          type: string
          format: date
        contractId:
          type: string
          nullable: true
        partnerName:
          type: string
          nullable: true
        status:
          type: string
          nullable: true

    Notification:
      type: object
      required: [id, type, title, read, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [contract_expiring, report_expected, approval_needed, general]
        title:
          type: string
        message:
          type: string
          nullable: true
        link:
          type: string
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      required: [id, action, entityType, entityId, timestamp]
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        userEmail:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        action:
          type: string
          enum: [create, update, delete, status_change, login, logout]
        entityType:
          type: string
        entityId:
          type: string
          nullable: true
        beforeSummary:
          type: string
          nullable: true
        afterSummary:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    ContractImportInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    ImportResult:
      type: object
      required: [imported, failed, errors]
      properties:
        imported:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: object
            required: [row, message]
            properties:
              row:
                type: integer
              message:
                type: string

    PaginatedContracts:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContractListItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PaginatedPartners:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Partner'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PaginatedContent:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContentItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PaginatedAuditLogs:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PaginatedRevenueReports:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RevenueReport'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginData'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/sso/config:
    get:
      operationId: getSsoConfig
      summary: Get SSO configuration status
      security: []
      responses:
        '200':
          description: SSO configuration status
          content:
            application/json:
              schema:
                type: object
                required: [enabled]
                properties:
                  enabled:
                    type: boolean

  /auth/logout:
    post:
      operationId: logout
      summary: Logout current user
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/me:
    get:
      operationId: getMe
      summary: Get current user
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
